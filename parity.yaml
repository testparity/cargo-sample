settings:
  namespace_roots:
    code/src: src
    code/tests: tests
  source_extension: ".rs"
  test_suffix: "_test"
  test_extension: ".rs"
  namespace_separator: "::"

coverage_xml: coverage-xml
min_coverage: 70
min_coverage_global: 80
min_matched_coverage: 40

structure:
  - name: "Cargo sample"
    paths:
      source: "code/src"
      test: "code/tests"
    rules:
      - minimum-coverage:
          min: 70
      - matched-coverage:
          min: 40
